<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="theme-color" content="#F5F0E8">
  <title>Quiz</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;500&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    :root {
      --bg: #F5F0E8;
      --card: #FEFCF8;
      --gold: #C4974A;
      --gold-light: #E8D4A8;
      --gold-pale: #FBF5E8;
      --sage: #7A9E7E;
      --sage-pale: #EEF4EE;
      --coral: #C4705A;
      --coral-pale: #FAF0ED;
      --stone: #9A968F;
      --stone-light: #C8C4BC;
      --stone-pale: #F0EDE6;
      --dark: #2A2720;
      --shadow-sm: 0 2px 16px rgba(42,39,32,0.07);
      --shadow-md: 0 6px 28px rgba(42,39,32,0.11);
      --radius: 22px;
      --radius-sm: 14px;
    }

    html, body { height: 100%; background: var(--bg); overflow-x: hidden; }

    body {
      font-family: 'Noto Serif JP', serif;
      color: var(--dark);
      min-height: 100svh;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }

    .app {
      max-width: 430px;
      margin: 0 auto;
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    .app::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 10% 15%, rgba(196,151,74,0.09) 0%, transparent 50%),
        radial-gradient(ellipse at 90% 85%, rgba(122,158,126,0.07) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── Screens ── */
    .screen {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      z-index: 1;
      transition: opacity 0.35s ease, transform 0.35s ease;
    }

    .screen.hidden {
      opacity: 0;
      transform: translateY(16px);
      pointer-events: none;
    }

    /* ── HOME ── */
    #home {
      padding: 56px 24px 32px;
      justify-content: space-between;
    }

    .home-top { flex: 1; }

    .eyebrow {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.2em;
      color: var(--stone);
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .home-title {
      font-family: 'Noto Serif JP', serif;
      font-weight: 300;
      font-size: 42px;
      line-height: 1.15;
      letter-spacing: -0.02em;
      color: var(--dark);
      margin-bottom: 8px;
    }

    .home-title span { font-weight: 500; color: var(--gold); }

    .home-sub {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--stone);
      letter-spacing: 0.06em;
      margin-bottom: 40px;
    }

    /* Category grid */
    .cat-label {
      font-family: 'DM Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.2em;
      color: var(--stone-light);
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .cat-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 24px;
    }

    .cat-btn {
      background: var(--card);
      border: 2px solid transparent;
      border-radius: var(--radius-sm);
      padding: 16px 14px;
      cursor: pointer;
      text-align: left;
      transition: all 0.2s ease;
      box-shadow: var(--shadow-sm);
      user-select: none;
      -webkit-user-select: none;
    }

    .cat-btn:active { transform: scale(0.96); }

    .cat-btn.selected {
      border-color: var(--gold);
      background: var(--gold-pale);
    }

    .cat-emoji { font-size: 22px; margin-bottom: 6px; display: block; }

    .cat-name {
      font-family: 'Noto Serif JP', serif;
      font-size: 13px;
      font-weight: 400;
      color: var(--dark);
      display: block;
    }

    .cat-en {
      font-family: 'DM Mono', monospace;
      font-size: 9px;
      color: var(--stone-light);
      letter-spacing: 0.06em;
      margin-top: 2px;
      display: block;
    }

    /* Difficulty */
    .diff-row {
      display: flex;
      gap: 8px;
      margin-bottom: 28px;
    }

    .diff-btn {
      flex: 1;
      background: var(--card);
      border: 2px solid transparent;
      border-radius: 40px;
      padding: 10px 8px;
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.08em;
      color: var(--stone);
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: var(--shadow-sm);
      user-select: none;
      -webkit-user-select: none;
    }

    .diff-btn.selected { border-color: var(--gold); color: var(--gold); background: var(--gold-pale); font-weight: 400; }

    /* Start button */
    .start-btn {
      width: 100%;
      background: var(--dark);
      color: var(--bg);
      border: none;
      border-radius: var(--radius);
      padding: 20px;
      font-family: 'Noto Serif JP', serif;
      font-size: 17px;
      font-weight: 400;
      letter-spacing: 0.06em;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: var(--shadow-md);
      user-select: none;
      -webkit-user-select: none;
    }

    .start-btn:active { transform: scale(0.97); }
    .start-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── QUIZ ── */
    #quiz { padding: 0; }

    .quiz-header {
      padding: 52px 24px 20px;
      position: relative;
      z-index: 1;
    }

    .quiz-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .quiz-back {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: var(--stone);
      background: none;
      border: none;
      cursor: pointer;
      letter-spacing: 0.06em;
      padding: 0;
    }

    .quiz-score-pill {
      background: var(--dark);
      color: var(--bg);
      border-radius: 40px;
      padding: 5px 14px;
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      letter-spacing: 0.06em;
    }

    .progress-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .progress-bar {
      flex: 1;
      height: 3px;
      background: var(--stone-pale);
      border-radius: 4px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(to right, var(--gold), var(--sage));
      border-radius: 4px;
      transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .progress-num {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: var(--stone);
      white-space: nowrap;
    }

    .quiz-body {
      flex: 1;
      padding: 0 24px 32px;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }

    /* Question card */
    .q-card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 28px 24px;
      box-shadow: var(--shadow-sm);
      border: 1px solid rgba(200,196,188,0.4);
      margin-bottom: 20px;
      transition: all 0.3s ease;
    }

    .q-cat-tag {
      font-family: 'DM Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.14em;
      color: var(--gold);
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .q-text {
      font-family: 'Noto Serif JP', serif;
      font-weight: 400;
      font-size: 17px;
      line-height: 1.65;
      color: var(--dark);
    }

    /* Answer options */
    .answers {
      display: flex;
      flex-direction: column;
      gap: 10px;
      flex: 1;
    }

    .ans-btn {
      background: var(--card);
      border: 2px solid rgba(200,196,188,0.4);
      border-radius: var(--radius-sm);
      padding: 18px 20px;
      text-align: left;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: var(--shadow-sm);
      display: flex;
      align-items: center;
      gap: 14px;
      user-select: none;
      -webkit-user-select: none;
    }

    .ans-btn:active:not(:disabled) { transform: scale(0.975); }

    .ans-letter {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: var(--stone-pale);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--stone);
      flex-shrink: 0;
      transition: all 0.2s ease;
    }

    .ans-text {
      font-family: 'Noto Serif JP', serif;
      font-size: 14px;
      line-height: 1.5;
      color: var(--dark);
      flex: 1;
    }

    .ans-btn.correct {
      border-color: var(--sage);
      background: var(--sage-pale);
    }

    .ans-btn.correct .ans-letter {
      background: var(--sage);
      color: white;
    }

    .ans-btn.wrong {
      border-color: var(--coral);
      background: var(--coral-pale);
    }

    .ans-btn.wrong .ans-letter {
      background: var(--coral);
      color: white;
    }

    .ans-btn:disabled { cursor: default; }

    /* Feedback bar */
    .feedback-bar {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%) translateY(100%);
      width: 100%;
      max-width: 430px;
      padding: 20px 24px calc(20px + env(safe-area-inset-bottom));
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      z-index: 10;
    }

    .feedback-bar.show { transform: translateX(-50%) translateY(0); }
    .feedback-bar.correct-fb { background: var(--sage); }
    .feedback-bar.wrong-fb { background: var(--coral); }

    .feedback-msg {
      font-family: 'Noto Serif JP', serif;
      font-size: 16px;
      color: white;
      font-weight: 400;
    }

    .feedback-sub {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: rgba(255,255,255,0.7);
      margin-top: 2px;
      letter-spacing: 0.06em;
    }

    .next-btn {
      background: rgba(255,255,255,0.25);
      border: none;
      border-radius: 40px;
      padding: 10px 20px;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.08em;
      color: white;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
    }

    /* ── RESULT ── */
    #result { padding: 56px 24px 40px; justify-content: center; align-items: center; text-align: center; }

    .result-ring {
      width: 140px;
      height: 140px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      margin: 0 auto 32px;
      position: relative;
    }

    .result-ring::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: conic-gradient(var(--gold) var(--pct, 0%), var(--stone-pale) 0%);
      -webkit-mask: radial-gradient(farthest-side, transparent calc(100% - 10px), black calc(100% - 9px));
      mask: radial-gradient(farthest-side, transparent calc(100% - 10px), black calc(100% - 9px));
    }

    .result-score-num {
      font-family: 'DM Mono', monospace;
      font-size: 38px;
      font-weight: 400;
      color: var(--dark);
      line-height: 1;
    }

    .result-score-total {
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      color: var(--stone);
      margin-top: 4px;
    }

    .result-grade {
      font-family: 'Noto Serif JP', serif;
      font-size: 28px;
      font-weight: 300;
      color: var(--dark);
      margin-bottom: 8px;
    }

    .result-msg {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--stone);
      letter-spacing: 0.08em;
      margin-bottom: 48px;
    }

    .result-btns { display: flex; flex-direction: column; gap: 12px; width: 100%; }

    .retry-btn {
      width: 100%;
      background: var(--dark);
      color: var(--bg);
      border: none;
      border-radius: var(--radius);
      padding: 18px;
      font-family: 'Noto Serif JP', serif;
      font-size: 16px;
      cursor: pointer;
      transition: transform 0.15s ease;
      box-shadow: var(--shadow-md);
    }

    .retry-btn:active { transform: scale(0.97); }

    .home-btn {
      width: 100%;
      background: transparent;
      color: var(--stone);
      border: 2px solid var(--stone-pale);
      border-radius: var(--radius);
      padding: 16px;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.1em;
      cursor: pointer;
    }

    /* Loading */
    .loading {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
    }

    .loading-dots {
      display: flex;
      gap: 6px;
    }

    .loading-dots span {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--gold);
      animation: dot-bounce 1.2s ease infinite;
    }

    .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
    .loading-dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes dot-bounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-8px); opacity: 1; }
    }

    .loading-text {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--stone);
      letter-spacing: 0.1em;
    }

    /* Noise */
    .noise {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 999;
      opacity: 0.02;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    }

    @keyframes pop-in {
      from { opacity: 0; transform: scale(0.92) translateY(8px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }

    .ans-btn { animation: pop-in 0.3s ease both; }
    .ans-btn:nth-child(1) { animation-delay: 0.05s; }
    .ans-btn:nth-child(2) { animation-delay: 0.10s; }
    .ans-btn:nth-child(3) { animation-delay: 0.15s; }
    .ans-btn:nth-child(4) { animation-delay: 0.20s; }
  </style>
</head>
<body>
  <div class="noise"></div>

  <!-- HOME -->
  <div class="screen" id="home">
    <div class="home-top">
      <div class="eyebrow">Trivia Quiz</div>
      <div class="home-title">知識を<br><span>試そう</span></div>
      <div class="home-sub">10 questions · powered by Open Trivia DB</div>

      <div class="cat-label">カテゴリ</div>
      <div class="cat-grid" id="cat-grid"></div>

      <div class="cat-label">難易度</div>
      <div class="diff-row" id="diff-row">
        <button class="diff-btn selected" data-diff="easy">Easy</button>
        <button class="diff-btn" data-diff="medium">Medium</button>
        <button class="diff-btn" data-diff="hard">Hard</button>
      </div>
    </div>

    <button class="start-btn" id="start-btn" onclick="startQuiz()">スタート →</button>
  </div>

  <!-- QUIZ -->
  <div class="screen hidden" id="quiz">
    <div class="quiz-header">
      <div class="quiz-meta">
        <button class="quiz-back" onclick="goHome()">← ホーム</button>
        <div class="quiz-score-pill">スコア <span id="score-display">0</span></div>
      </div>
      <div class="progress-wrap">
        <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
        <div class="progress-num" id="progress-num">1 / 10</div>
      </div>
    </div>
    <div class="quiz-body" id="quiz-body">
      <div class="loading">
        <div class="loading-dots"><span></span><span></span><span></span></div>
        <div class="loading-text">Loading questions...</div>
      </div>
    </div>
    <div class="feedback-bar" id="feedback-bar">
      <div>
        <div class="feedback-msg" id="feedback-msg"></div>
        <div class="feedback-sub" id="feedback-sub"></div>
      </div>
      <button class="next-btn" id="next-btn" onclick="nextQuestion()">次へ →</button>
    </div>
  </div>

  <!-- RESULT -->
  <div class="screen hidden" id="result">
    <div class="result-ring" id="result-ring">
      <div class="result-score-num" id="result-num">0</div>
      <div class="result-score-total" id="result-total">/ 10</div>
    </div>
    <div class="result-grade" id="result-grade"></div>
    <div class="result-msg" id="result-msg"></div>
    <div class="result-btns">
      <button class="retry-btn" onclick="retryQuiz()">もう一度挑戦</button>
      <button class="home-btn" onclick="goHome()">カテゴリを変える</button>
    </div>
  </div>

  <script>
    const CATEGORIES = [
      { id: 9,  emoji: '🌍', name: '雑学',       en: 'General Knowledge' },
      { id: 17, emoji: '🔬', name: '科学・自然',  en: 'Science & Nature' },
      { id: 18, emoji: '💻', name: 'コンピュータ', en: 'Computers' },
      { id: 22, emoji: '🗺️', name: '地理',       en: 'Geography' },
      { id: 23, emoji: '📜', name: '歴史',       en: 'History' },
      { id: 21, emoji: '⚽', name: 'スポーツ',   en: 'Sports' },
      { id: 11, emoji: '🎬', name: '映画',       en: 'Film' },
      { id: 27, emoji: '🦁', name: '動物',       en: 'Animals' },
    ];

    let selectedCat = CATEGORIES[0];
    let selectedDiff = 'easy';
    let questions = [];
    let currentQ = 0;
    let score = 0;

    // Build category grid
    const catGrid = document.getElementById('cat-grid');
    CATEGORIES.forEach(cat => {
      const btn = document.createElement('button');
      btn.className = 'cat-btn' + (cat === selectedCat ? ' selected' : '');
      btn.innerHTML = `<span class="cat-emoji">${cat.emoji}</span><span class="cat-name">${cat.name}</span><span class="cat-en">${cat.en}</span>`;
      btn.onclick = () => {
        selectedCat = cat;
        document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
      };
      catGrid.appendChild(btn);
    });

    // Difficulty
    document.getElementById('diff-row').addEventListener('click', e => {
      const btn = e.target.closest('.diff-btn');
      if (!btn) return;
      selectedDiff = btn.dataset.diff;
      document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
    });

    function showScreen(id) {
      document.querySelectorAll('.screen').forEach(s => {
        s.classList.toggle('hidden', s.id !== id);
      });
    }

    function decodeHTML(html) {
      const txt = document.createElement('textarea');
      txt.innerHTML = html;
      return txt.value;
    }

    function shuffle(arr) {
      return [...arr].sort(() => Math.random() - 0.5);
    }

    async function startQuiz() {
      showScreen('quiz');
      document.getElementById('quiz-body').innerHTML = `
        <div class="loading">
          <div class="loading-dots"><span></span><span></span><span></span></div>
          <div class="loading-text">Loading questions...</div>
        </div>`;
      hideFeedback();

      const url = `https://opentdb.com/api.php?amount=10&category=${selectedCat.id}&difficulty=${selectedDiff}&type=multiple`;
      try {
        const res = await fetch(url);
        const data = await res.json();
        if (data.response_code !== 0 || !data.results.length) throw new Error('No questions');
        questions = data.results;
        currentQ = 0;
        score = 0;
        document.getElementById('score-display').textContent = 0;
        renderQuestion();
      } catch {
        document.getElementById('quiz-body').innerHTML = `
          <div class="loading">
            <div class="loading-text" style="color:var(--coral)">読み込み失敗。再試行してください。</div>
          </div>`;
      }
    }

    function renderQuestion() {
      const q = questions[currentQ];
      const total = questions.length;
      const pct = (currentQ / total) * 100;

      document.getElementById('progress-fill').style.width = pct + '%';
      document.getElementById('progress-num').textContent = `${currentQ + 1} / ${total}`;

      const answers = shuffle([q.correct_answer, ...q.incorrect_answers]);

      document.getElementById('quiz-body').innerHTML = `
        <div class="q-card">
          <div class="q-cat-tag">${selectedCat.emoji} ${selectedCat.name}</div>
          <div class="q-text">${decodeHTML(q.question)}</div>
        </div>
        <div class="answers" id="answers"></div>`;

      const letters = ['A', 'B', 'C', 'D'];
      const ansWrap = document.getElementById('answers');

      answers.forEach((ans, i) => {
        const btn = document.createElement('button');
        btn.className = 'ans-btn';
        btn.style.animationDelay = `${i * 0.05}s`;
        btn.innerHTML = `<div class="ans-letter">${letters[i]}</div><div class="ans-text">${decodeHTML(ans)}</div>`;
        btn.onclick = () => selectAnswer(ans, q.correct_answer, answers);
        ansWrap.appendChild(btn);
      });
    }

    function selectAnswer(chosen, correct, all) {
      document.querySelectorAll('.ans-btn').forEach(btn => {
        btn.disabled = true;
        const text = btn.querySelector('.ans-text').textContent;
        if (text === decodeHTML(correct)) btn.classList.add('correct');
        else if (text === decodeHTML(chosen) && chosen !== correct) btn.classList.add('wrong');
      });

      const isCorrect = chosen === correct;
      if (isCorrect) score++;
      document.getElementById('score-display').textContent = score;

      showFeedback(isCorrect, decodeHTML(correct));
    }

    function showFeedback(isCorrect, correctAns) {
      const bar = document.getElementById('feedback-bar');
      bar.className = 'feedback-bar show ' + (isCorrect ? 'correct-fb' : 'wrong-fb');
      document.getElementById('feedback-msg').textContent = isCorrect ? '正解！ 🎉' : '不正解…';
      document.getElementById('feedback-sub').textContent = isCorrect ? 'Great job!' : `正解: ${correctAns}`;
      const isLast = currentQ === questions.length - 1;
      document.getElementById('next-btn').textContent = isLast ? '結果を見る →' : '次へ →';
    }

    function hideFeedback() {
      document.getElementById('feedback-bar').className = 'feedback-bar';
    }

    function nextQuestion() {
      hideFeedback();
      currentQ++;
      if (currentQ >= questions.length) {
        showResult();
      } else {
        renderQuestion();
      }
    }

    function showResult() {
      showScreen('result');
      const total = questions.length;
      const pct = Math.round((score / total) * 100);

      document.getElementById('result-num').textContent = score;
      document.getElementById('result-total').textContent = `/ ${total}`;
      document.getElementById('result-ring').style.setProperty('--pct', pct + '%');

      const grades = [
        { min: 90, grade: '完璧！',   msg: 'PERFECT SCORE' },
        { min: 70, grade: '素晴らしい', msg: 'EXCELLENT' },
        { min: 50, grade: 'よくできました', msg: 'GOOD JOB' },
        { min: 30, grade: 'まずまず',  msg: 'KEEP TRYING' },
        { min: 0,  grade: 'ドンマイ', msg: 'BETTER LUCK NEXT TIME' },
      ];

      const g = grades.find(g => pct >= g.min);
      document.getElementById('result-grade').textContent = g.grade;
      document.getElementById('result-msg').textContent = g.msg;
    }

    function retryQuiz() { startQuiz(); }
    function goHome() { hideFeedback(); showScreen('home'); }
  </script>
</body>
</html>
